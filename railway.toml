const { logEvent } = require("./state");

const MCP_URL = "https://mcp.trayd.ai/mcp";

// Credentials come from environment variables — never hardcoded
function getCreds() {
  const email = process.env.RH_EMAIL;
  const password = process.env.RH_PASSWORD;
  if (!email || !password) {
    throw new Error("RH_EMAIL and RH_PASSWORD environment variables must be set");
  }
  return { email, password };
}

async function callTraydDirect(userMessage) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      messages: [{ role: "user", content: userMessage }],
      mcp_servers: [{ type: "url", url: MCP_URL, name: "trayd" }],
    }),
  });
  return res.json();
}

async function checkLoginStatus() {
  try {
    const data = await callTraydDirect("Check my Robinhood login status using check_login_status.");
    const toolResult = data.content?.find((b) => b.type === "mcp_tool_result");
    const text = toolResult?.content?.[0]?.text || "";
    try { return JSON.parse(text); } catch { return { raw: text }; }
  } catch (err) {
    logEvent("AUTH_ERROR", `checkLoginStatus failed: ${err.message}`);
    return { logged_in: false };
  }
}

async function linkRobinhood() {
  const { email, password } = getCreds();
  logEvent("AUTH", "Initiating Robinhood re-link...");

  try {
    // Step 1: link (sends phone notification)
    const linkData = await callTraydDirect(
      `Link my Robinhood account using link_robinhood with email="${email}" and password="${password}".`
    );
    const linkResult = linkData.content?.find((b) => b.type === "mcp_tool_result");
    const linkText = linkResult?.content?.[0]?.text || "";
    let parsed;
    try { parsed = JSON.parse(linkText); } catch { parsed = { raw: linkText }; }

    if (parsed?.status === "awaiting_approval") {
      logEvent("AUTH", "Phone notification sent — waiting 20s for approval...");
      await sleep(20000);

      // Step 2: complete link
      const completeData = await callTraydDirect(
        `Complete my Robinhood link using complete_robinhood_link with email="${email}" and password="${password}".`
      );
      const completeResult = completeData.content?.find((b) => b.type === "mcp_tool_result");
      const completeText = completeResult?.content?.[0]?.text || "";
      let completeParsed;
      try { completeParsed = JSON.parse(completeText); } catch { completeParsed = { raw: completeText }; }

      if (completeParsed?.status === "logged_in") {
        logEvent("AUTH", "✅ Robinhood re-link successful");
        return true;
      } else if (completeParsed?.status === "sms_required") {
        logEvent("AUTH_ERROR", "SMS required — cannot auto-complete. Manual login needed.");
        return false;
      } else {
        logEvent("AUTH_ERROR", `Unexpected complete response: ${JSON.stringify(completeParsed)}`);
        return false;
      }
    } else {
      logEvent("AUTH_ERROR", `Unexpected link response: ${JSON.stringify(parsed)}`);
      return false;
    }
  } catch (err) {
    logEvent("AUTH_ERROR", `linkRobinhood failed: ${err.message}`);
    return false;
  }
}

async function ensureLoggedIn() {
  const status = await checkLoginStatus();
  if (status?.logged_in === true || status?.status === "logged_in") {
    logEvent("AUTH", "✅ Robinhood session active");
    return true;
  }
  logEvent("AUTH", "Session expired — re-linking...");
  return linkRobinhood();
}

// Schedule daily reauth at 9:00 AM ET (14:00 UTC)
function scheduleDailyReauth() {
  logEvent("AUTH", "Daily reauth scheduler started");

  function msUntilNext9amET() {
    const now = new Date();
    const target = new Date();
    // ET is UTC-4 (EDT) or UTC-5 (EST) — use UTC-4 for market hours
    target.setUTCHours(13, 0, 0, 0); // 9:00 AM ET = 13:00 UTC (EDT)
    if (target <= now) target.setUTCDate(target.getUTCDate() + 1);
    return target - now;
  }

  function scheduleNext() {
    const delay = msUntilNext9amET();
    const minutes = Math.round(delay / 60000);
    logEvent("AUTH", `Next reauth in ${minutes} minutes`);
    setTimeout(async () => {
      await ensureLoggedIn();
      scheduleNext(); // reschedule for next day
    }, delay);
  }

  scheduleNext();
}

function sleep(ms) {
  return new Promise((resolve) => setTimeout(resolve, ms));
}

module.exports = { ensureLoggedIn, scheduleDailyReauth, checkLoginStatus };
